services:
  # ── ChromaDB vector database ────────────────────────────────────────────────
  - type: web
    name: uniconnect-chromadb
    runtime: docker
    dockerfilePath: ./chromadb.Dockerfile
    plan: starter
    disk:
      name: chroma-data
      mountPath: /chroma/chroma
      sizeGB: 1
    envVars:
      - key: IS_PERSISTENT
        value: "TRUE"
      - key: ANONYMIZED_TELEMETRY
        value: "FALSE"

  # ── FastAPI backend ─────────────────────────────────────────────────────────
  - type: web
    name: uniconnect-backend
    runtime: docker
    dockerContext: ./backend
    dockerfilePath: ./backend/Dockerfile
    plan: starter
    envVars:
      - key: APP_ENV
        value: production
      - key: DEBUG
        value: "false"
      - key: HOST
        value: "0.0.0.0"
      - key: PORT
        value: "8000"
      - key: DATABASE_URL
        fromDatabase:
          name: uniconnect-db
          property: connectionString
      - key: POSTGRES_HOST
        fromDatabase:
          name: uniconnect-db
          property: host
      - key: POSTGRES_PORT
        fromDatabase:
          name: uniconnect-db
          property: port
      - key: POSTGRES_USER
        fromDatabase:
          name: uniconnect-db
          property: user
      - key: POSTGRES_PASSWORD
        fromDatabase:
          name: uniconnect-db
          property: password
      - key: POSTGRES_DB
        fromDatabase:
          name: uniconnect-db
          property: database
      - key: GEMINI_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: GEMINI_MODEL
        value: gemini-2.0-flash
      - key: OPENROUTER_API_KEY
        sync: false        # Set manually in Render dashboard
      - key: OPENROUTER_MODEL
        value: google/gemini-3.5-flash
      - key: CHROMA_HOST
        fromService:
          name: uniconnect-chromadb
          type: web
          property: host
      - key: CHROMA_PORT
        value: "443"
      - key: CHROMA_COLLECTION_NAME
        value: uniconnect_knowledge
      - key: JWT_SECRET_KEY
        sync: false        # Set manually in Render dashboard
      - key: JWT_REFRESH_SECRET_KEY
        sync: false        # Set manually in Render dashboard
      - key: JWT_ALGORITHM
        value: HS256
      - key: ACCESS_TOKEN_EXPIRE_MINUTES
        value: "30"
      - key: REFRESH_TOKEN_EXPIRE_DAYS
        value: "7"
      - key: UPLOAD_DIR
        value: uploads
      - key: MAX_UPLOAD_SIZE_MB
        value: "50"
      - key: ALLOWED_EXTENSIONS
        value: ".pdf,.docx,.txt"
      - key: CHUNK_SIZE
        value: "1000"
      - key: CHUNK_OVERLAP
        value: "200"
      - key: SIMILARITY_TOP_K
        value: "5"
      - key: CONFIDENCE_THRESHOLD
        value: "0.40"
      - key: RATE_LIMIT_PER_MINUTE
        value: "30"
      - key: CORS_ORIGINS
        value: '["*"]'

databases:
  - name: uniconnect-db
    plan: starter
    databaseName: uniconnect_db
    user: uniconnect